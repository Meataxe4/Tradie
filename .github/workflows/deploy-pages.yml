name: Deploy demo to GitHub Pages

# Publishes the self-contained live demo (index.html on the gh-pages branch)
# to GitHub Pages. `configure-pages` with enablement:true turns Pages on
# automatically, so no manual repo-settings toggle is needed.
on:
  workflow_dispatch:
  push:
    branches: [gh-pages]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages (the built demo)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload demo as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
